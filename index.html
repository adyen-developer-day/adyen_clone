<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="One platform for payments, data, and financial products. Built to scale with the world's leading businesses."
    />
    <title>Adyen: Fintech platform for enterprises</title>
    <script>
      // Apply a previously chosen theme before paint to avoid a flash.
      // With no stored choice, prefers-color-scheme handles it via CSS.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light" || t === "dark") {
            document.documentElement.dataset.theme = t;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
